<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Master Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📚 JEE Master Tracker</h1>
    <p>Daily • Weekly • Monthly Planner</p>
</header>

<section class="dashboard">

    <div class="box">
        <h2>📅 Today's Tasks</h2>
        <input type="text" id="taskInput" placeholder="Enter new task">

<button id="addTaskBtn">Add Task</button>

<hr>

<div id="taskList"></div>

        <label><input type="checkbox"> Physics Revision</label><br><br>

        <label><input type="checkbox"> Chemistry PYQs</label><br><br>

        <label><input type="checkbox"> Maths Practice</label>

    </div>

    <div class="box">
        <h2>📊 Overall Progress</h2>

        <progress value="0" max="100"></progress>

        <p>0% Completed</p>

    </div>

    <div class="box">

        <h2>🔥 Study Streak</h2>

        <h1>0 Days</h1>

    </div>

    <div class="box">

        <h2>⏳ JEE Countdown</h2>

        <h1 id="countdown">Loading...</h1>

    </div>

</section>

<script src="app.js"></script>

</body>
</html>
